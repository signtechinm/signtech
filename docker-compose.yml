services:
  postgres:
    image: postgres:16-alpine
    container_name: signtech-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: signtech
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - signtech_postgres_data:/var/lib/postgresql/data

volumes:
  signtech_postgres_data:
